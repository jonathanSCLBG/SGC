<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGC - Cuestionarios</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body { background: #f6f7fb; }

      .topbar { background: #28334f; color: #fff; }

      .cont-drop { display: inline-block; position: relative; }
      .usuario,
      .accion {
        display: block;
        padding: 6px 25px;
        color: #a3acc0;
        text-decoration: none;
        text-align: center;
        margin: 0;
        border-radius: 10px 10px 0 0;
        cursor: default;
      }
      .accion {
        padding: 6px 5px;
        border-radius: 10px;
        cursor: pointer;
      }
      .dropdown {
        width: 100%;
        background: #323c55;
        position: absolute;
        z-index: 999;
        display: none;
        border-radius: 0 0 10px 10px;
      }
      .accion:hover,
      .usuario:hover { background: #323c55; color: #fff; }

      .card-shadow {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        border: 0;
        border-radius: 14px;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .footer {
        margin: auto;
        width: 100%;
        max-width: 1100px;
        text-align: center;
        color: #1f2937;
        padding: 18px 8px;
      }
    </style>
  </head>

  <body>
    <!-- TOP BAR -->
    <div class="topbar py-3">
      <div
        class="container d-flex align-items-center justify-content-between"
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          width: 100%;
          max-width: 1100px;
        "
      >
        <div class="d-flex align-items-center gap-3">
          <div class="bg-white rounded px-2 py-1">
            <img
              src="https://sclconsultores.com.mx/imagenesRegistros/logo.svg"
              alt="logo"
              height="34"
            />
          </div>
          <div>
            <div class="fw-semibold">Sistema de Gestión de Calidad</div>
            <div class="small opacity-75">Cuestionarios</div>
          </div>
        </div>

        <div class="cont-drop">
          <p class="usuario" id="lblUsuario">Cargando... ▼</p>
          <div class="dropdown">
            <a href="php/logout.php" class="accion">Cerrar Sesión</a>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTENIDO -->
    <div
      class="container my-4"
      style="
        display: flex;
        justify-content: center;
        width: 100%;
        max-width: 1100px;
        height: 70vh;
        border-radius: 14px;
        box-shadow: 10px 18px 45px #111827;
        overflow: hidden;
        padding: 0;
      "
    >
      <div class="card card-shadow" style="width: 100%">
        <div class="card-body" style="padding: 0">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              background-color: #28334f;
            "
          >
            <h5
              class="card-title mb-3"
              style="margin: 0; padding: 20px; color: #f6f7fb"
            >
              Cuestionarios creados
            </h5>

            <button
              id="btnCrear"
              class="btn btn-light fw-semibold"
              style="height: 37px; width: 180px; margin-right: 15px"
            >
              + Crear cuestionario
            </button>
          </div>

          <div class="table-responsive" style="margin: 10px 10px">
            <table class="table table-striped table-hover align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Folio</th>
                  <th>Creación</th>
                  <th>Vencimiento</th>
                  <th>Estatus</th>
                  <th>Creador</th>
                  <th>Revisor</th>
                  <th>Última modificación</th>
                  <th style="width: 160px">Acción</th>
                </tr>
              </thead>
              <tbody id="tbodyCuestionarios">
                <tr>
                  <td colspan="9" class="text-center text-muted">Cargando...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL CREAR CUESTIONARIO -->
    <div class="modal fade" id="modalCrearCuestionario" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header" style="background:#28334f; color:#fff;">
            <h5 class="modal-title">Crear cuestionario</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="mb-3">
              <label for="selectRevisor" class="form-label fw-semibold">Selecciona un revisor</label>
              <select id="selectRevisor" class="form-select">
                <option value="">Cargando revisores...</option>
              </select>
            </div>

            <div class="small text-muted" id="infoRevisor"></div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnConfirmarCrear">Crear</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer" role="contentinfo">
      <small>
        © 2026 SCL Consultores ·
        <a href="" style="text-decoration: none; color: inherit">#Política de privacidad</a>
        ·
        <a href="" style="text-decoration: none; color: inherit">Términos</a>
      </small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      let revisoresCache = [];
      let modalCrear = null;

      function escapeHtml(str) {
        return String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function cargarUsuarioSesion() {
        try {
          const resp = await fetch("php/session_user.php", { cache: "no-store" });
          const data = await resp.json();

          if (!resp.ok || !data.ok) {
            window.location.href = "login.html";
            return;
          }

          document.getElementById("lblUsuario").textContent = `${data.user_nombre} ▼`;
        } catch (e) {
          console.error(e);
          document.getElementById("lblUsuario").textContent = "Usuario ▼";
        }
      }

      async function cargarTablaCuestionarios() {
        const tbody = document.getElementById("tbodyCuestionarios");
        tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted">Cargando...</td></tr>`;

        try {
          const resp = await fetch("php/listar_cuestionarios.php", { cache: "no-store" });
          const data = await resp.json();

          if (!resp.ok || !data.ok) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger">Error al cargar</td></tr>`;
            return;
          }

          if (!data.cuestionarios.length) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted">No hay cuestionarios</td></tr>`;
            return;
          }

          tbody.innerHTML = data.cuestionarios
            .map((q) => {
              const badge =
                q.estatus === "abierto"
                  ? "bg-success"
                  : q.estatus === "cerrado"
                  ? "bg-secondary"
                  : "bg-warning text-dark";

              const link = `app/sgc.html?cid=${q.id}&folio=${encodeURIComponent(q.folio)}`;

              return `
                <tr>
                  <td>${q.id}</td>
                  <td class="mono"><strong>${escapeHtml(q.folio)}</strong></td>
                  <td>${escapeHtml(q.fecha_creacion)}</td>
                  <td>${escapeHtml(q.fecha_vencimiento)}</td>
                  <td><span class="badge ${badge}">${escapeHtml(q.estatus)}</span></td>
                  <td>${escapeHtml(q.creado_por || "-")}</td>
                  <td>${escapeHtml(q.revisor_nombre || "-")}</td>
                  <td>
                    <div class="small">
                      <div><strong>${escapeHtml(q.actualizado_por || "-")}</strong></div>
                      <div class="text-muted">${escapeHtml(q.actualizado_en || "-")}</div>
                    </div>
                  </td>
                  <td>
                    <a href="${link}" class="btn btn-primary btn-sm">Continuar</a>
                  </td>
                </tr>
              `;
            })
            .join("");
        } catch (e) {
          console.error(e);
          tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger">Error de servidor</td></tr>`;
        }
      }

      async function cargarRevisores() {
        const select = document.getElementById("selectRevisor");
        const info = document.getElementById("infoRevisor");

        select.innerHTML = `<option value="">Cargando revisores...</option>`;
        info.textContent = "";

        try {
          const resp = await fetch("php/listar_revisores.php", { cache: "no-store" });
          const data = await resp.json();

          if (!resp.ok || !data.ok) {
            select.innerHTML = `<option value="">Error al cargar revisores</option>`;
            return;
          }

          revisoresCache = data.revisores || [];

          if (!revisoresCache.length) {
            select.innerHTML = `<option value="">No hay revisores disponibles</option>`;
            return;
          }

          select.innerHTML =
            `<option value="">Seleccione un revisor</option>` +
            revisoresCache
              .map(r => `<option value="${r.id}" data-email="${escapeHtml(r.email || "")}">${escapeHtml(r.nombre)}</option>`)
              .join("");

        } catch (e) {
          console.error(e);
          select.innerHTML = `<option value="">Error de servidor</option>`;
        }
      }

      document.getElementById("selectRevisor").addEventListener("change", function () {
        const id = this.value;
        const info = document.getElementById("infoRevisor");

        const revisor = revisoresCache.find(r => String(r.id) === String(id));

        if (!revisor) {
          info.textContent = "";
          return;
        }

        info.innerHTML = `
          <strong>Usuario:</strong> ${escapeHtml(revisor.usuario || "-")}<br>
          <strong>Email:</strong> ${escapeHtml(revisor.email || "-")}
        `;
      });

      document.getElementById("btnCrear").addEventListener("click", async () => {
        await cargarRevisores();
        const select = document.getElementById("selectRevisor");
        select.value = "";
        document.getElementById("infoRevisor").textContent = "";
        modalCrear.show();
      });

      document.getElementById("btnConfirmarCrear").addEventListener("click", async () => {
        const revisorId = document.getElementById("selectRevisor").value;

        if (!revisorId) {
          alert("Selecciona un revisor.");
          return;
        }

        try {
          const formData = new FormData();
          formData.append("revisor_id", revisorId);

          const resp = await fetch("php/crear_cuestionario.php", {
            method: "POST",
            body: formData,
            cache: "no-store"
          });

          const raw = await resp.text();
          let data;

          try {
            data = JSON.parse(raw);
          } catch (e) {
            console.error("No es JSON:", raw);
            alert("El servidor no devolvió JSON. Revisa consola.");
            return;
          }

          console.log("Respuesta crear_cuestionario:", data);

          if (!resp.ok || !data.ok) {
            alert((data.msg || "Error al crear cuestionario") + "\n\n" + (data.detalle || ""));
            return;
          }

          modalCrear.hide();
          await cargarTablaCuestionarios();

          const resumen =
            `✅ Cuestionario creado\n\n` +
            `CID: ${data.cid}\n` +
            `Folio: ${data.folio}\n` +
            `Revisor: ${data.revisor_nombre || "-"}\n\n` +
            `📧 email_ok: ${data.email_ok}\n` +
            `📧 email_msg: ${data.email_msg || "Sin detalle"}\n\n` +
            `¿Quieres abrir el cuestionario ahora?`;

          const ir = confirm(resumen);
          if (!ir) return;

          window.location.href = `app/sgc.html?cid=${data.cid}&folio=${encodeURIComponent(data.folio)}`;
        } catch (e) {
          console.error(e);
          alert("Error de servidor");
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        modalCrear = new bootstrap.Modal(document.getElementById("modalCrearCuestionario"));
        cargarUsuarioSesion();
        cargarTablaCuestionarios();
      });
    </script>
  </body>
</html>
