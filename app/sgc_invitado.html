    <!-- ============================================================
       CONTENEDOR: aquí se inyectan las pagina_X.html
       ============================================================ -->
    <div class="seccion">
      <form id="form-cuestionario">
        <div
          id="contenedor-cuestionario"
          class="seccion"
          style="text-align: center"
        >
          <!-- Aquí se carga pagina_1.html, pagina_2.html, etc. -->

    <!-- Bootstrap JS (tooltips, tabs, modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      /* ============================================================
       Datos básicos de la URL
       (siempre conviene leerlos así para no depender de variables viejas)
       ============================================================ */
      const params = new URLSearchParams(window.location.search);
      const cid = params.get("cid");
      const folio = params.get("folio");

      /* ============================================================
       Variables de estado
       ============================================================ */
      let seccionActual = 1;
      let modalPendientes = null;

      /* ============================================================
       Deja bonita la pestaña activa (solo estilo)
       ============================================================ */
      function marcarActivo(numero) {
        document
          .querySelectorAll(".nav-link")
          .forEach((a) => a.classList.remove("active"));
        document
          .querySelectorAll(".nav-link")
          [numero - 1]?.classList.add("active");
      }

      /* ============================================================
       Carga una sección completa (pagina_X.html)
       ============================================================ */
      function cargarCuestionario(numero) {
        seccionActual = numero;

        fetch(`pagina_${numero}.html`, { cache: "no-store" })
          .then((r) => r.text())
          .then(async (html) => {
            // Inyectamos el HTML de la sección
            document.getElementById("contenedor-cuestionario").innerHTML = html;
            marcarActivo(numero);

            // 1) Precargamos respuestas y evidencias desde BD
            await cargarRespuestasSeccion();

            // 2) Bloqueamos edición (revisor = solo lectura)
            bloquearInputs();

            // 3) Ocultamos elementos sobrantes
            ocultarElementos();

            // 4) Convierte los inputs a parrafos
            convertirInputsAParrafos();
          })
          .catch((err) => {
            console.error(err);
            document.getElementById("contenedor-cuestionario").innerHTML =
              "<p>Error al cargar el cuestionario.</p>";
          });
      }

      /* ============================================================
       Precargar respuestas + evidencias desde el backend del preparador
       Endpoint: ../php/obtener_respuestas.php
       ============================================================ */
      async function cargarRespuestasSeccion() {
        const seccion = `pagina_${seccionActual}`;

        const url = new URL(
          "../php/obtener_respuestas.php",
          window.location.href,
        );
        if (cid) url.searchParams.set("cid", cid);
        if (folio) url.searchParams.set("folio", folio);
        url.searchParams.set("seccion", seccion);

        const resp = await fetch(url.toString(), { cache: "no-store" });
        const data = await resp.json();

        if (!resp.ok || !data.ok) {
          console.error("Error al obtener respuestas:", data);
          return;
        }

        // Creamos un mapa pregunta -> datos para buscar rápido
        const mapa = new Map();
        for (const r of data.respuestas) {
          mapa.set(String(r.pregunta), r);
        }

        const form = document.getElementById("form-cuestionario");
        const bloques = form.querySelectorAll(".pregunta[data-pregunta]");

        bloques.forEach((b) => {
          const num = b.getAttribute("data-pregunta");
          const guardado = mapa.get(num);

          const sel = b.querySelector(".respuesta");
          const txt = b.querySelector(".comentarios");

          // Pintamos respuesta y comentarios
          if (guardado) {
            if (sel) sel.value = guardado.respuesta ?? "";
            if (txt) txt.value = guardado.comentarios ?? "";
          } else {
            if (sel) sel.value = "";
            if (txt) txt.value = "";
          }

          // Pintamos evidencias
          let evidencias = [];
          if (guardado && guardado.nom_evidencia) {
            try {
              evidencias = JSON.parse(guardado.nom_evidencia) || [];
            } catch {
              evidencias = [];
            }
          }

          pintarEvidencias(b, evidencias);
        });
      }

      /* ============================================================
       Mostrar evidencias como links
       Nota: aquí solo se ven/descargan; no se borran.
       ============================================================ */
      function pintarEvidencias(bloquePregunta, evidencias) {
        const cont = bloquePregunta.querySelector(".evidencias-guardadas");
        if (!cont) return;

        if (!Array.isArray(evidencias) || evidencias.length === 0) {
          cont.innerHTML =
            "<span class='text-muted'>Sin evidencias guardadas.</span>";
          return;
        }

        const items = evidencias
          .map((ev) => {
            const name = escapeHtml(ev.name || "archivo");
            const url = escapeHtml(ev.url || "#");
            return `<li><a href="../${url}" target="_blank" rel="noopener">${name}</a></li>`;
          })
          .join("");

        cont.innerHTML = `
        <div><strong>Evidencias guardadas:</strong></div>
        <ul class="mb-0">${items}</ul>
      `;
      }

      /* ============================================================
       Bloquear inputs para que el revisor no modifique nada del cuestionario
       ============================================================ */
      function bloquearInputs() {
        const form = document.getElementById("form-cuestionario");

        form
          .querySelectorAll(
            "select.respuesta, textarea.comentarios, input.evidencia",
          )
          .forEach((el) => {
            el.disabled = true;
          });

        // Si alguna plantilla trae el botón de “Guardar” del preparador, lo ocultamos
        const btnGuardar = document.querySelector(
          "#contenedor-cuestionario #btnGuardar",
        );
        if (btnGuardar) btnGuardar.style.display = "none";
      }

     /* ============================================================
      Ocultamos elementos que solo deberian ser visibles para el preparador
      ============================================================ */
      function ocultarElementos() {
        // Ocultar todos los .dropApoyo dentro de #contenedor-cuestionario
        const drops = document.querySelectorAll('#contenedor-cuestionario .contDrops');
        drops.forEach(el => {
          el.style.display = 'none';
        });

        //Oculta el input para subir documentos como evidencia
        const ocultarEvidencia = document.querySelectorAll('#contenedor-cuestionario .inputEvidencia')
        ocultarEvidencia.forEach(el => {
          el.style.display = 'none';
        });

        //Oculta el lavel de cada textarea
        const ocultarLabel = document.querySelectorAll('#contenedor-cuestionario .labelComentarios')
        ocultarLabel.forEach(el => {
          el.style.display = 'none';
        });
       }

      /* ============================================================
       Cambia los inputs por parrafos para mejorar la lecutra
       ============================================================ */
      function convertirInputsAParrafos() {
        const form = document.getElementById("form-cuestionario");
        const bloques = form.querySelectorAll(".pregunta[data-pregunta]");

        bloques.forEach((b) => {
          const sel = b.querySelector("select.respuesta");
          const txt = b.querySelector("textarea.comentarios");

          // ---- SELECT -> <p> ----
          if (sel) {
            // Texto visible del option seleccionado
            const optionText =
              sel.selectedOptions?.[0]?.textContent?.trim() || "";
            const pSel = document.createElement("p");
            pSel.className = "respuesta-p form-control-plaintext mb-2";
            pSel.textContent = optionText || "—";

            // Ocultamos el select (o podrías eliminarlo)
            sel.style.display = "none";
            sel.insertAdjacentElement("afterend", pSel);
          }

          // ---- TEXTAREA -> <p> ----
          if (txt) {
            const pTxt = document.createElement("p");
            pTxt.className = "comentarios-p form-control-plaintext";
            // respeta saltos de línea:
            pTxt.style.whiteSpace = "pre-wrap";
            pTxt.textContent = (txt.value || "").trim() || "—";

            txt.style.display = "none";
            txt.insertAdjacentElement("afterend", pTxt);
          }
        });
      }

      /* ============================================================
       Escape HTML básico para imprimir texto de BD sin riesgos
       ============================================================ */
      function escapeHtml(str) {
        return String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      /* ============================================================
       Arranque:
       - Tooltips
       - Sesión/rol
       - Carga sección 1
       ============================================================ */
      document.addEventListener("DOMContentLoaded", async () => {
        document
          .querySelectorAll('[data-bs-toggle="tooltip"]')
          .forEach((el) => new bootstrap.Tooltip(el));
        cargarCuestionario(1);
      });
    </script>
