  <style>
    /* ==========
       IMPORTANTE: el “azul” no existe en Bootstrap como btn-outline-blue
       así que lo definimos aquí para que SIEMPRE se vea.
       ========== */
    .btn-outline-blue{
      color:#28334f;
      border:1px solid #28334f;
      background:transparent;
    }
    .btn-outline-blue:hover{
      background-color:#28334f;
      border-color:#28334f;
      color:#fff;
    }

    /* Botoncito 📝 por pregunta */
    .btn-nota{
      position:absolute;
      top:10px;
      right:10px;
      z-index:5;
      line-height:1;
      border:none;
    }

    /* Badge ROJO: pendientes */
    .btn-nota[data-badge]::after{
      content:attr(data-badge);
      position:absolute;
      top:-8px;
      right:-8px;
      background:#dc3545;
      color:#fff;
      border-radius:999px;
      font-size:11px;
      padding:1px 6px;
      line-height:1.4;
    }

    /* Badge VERDE: validada */
    .btn-nota[data-badge-ok]::before{
      content:attr(data-badge-ok);
      position:absolute;
      top:-8px;
      right:-8px;
      background:#198754;
      color:#fff;
      border-radius:999px;
      font-size:11px;
      padding:1px 6px;
      line-height:1.4;
    }

    /* Botón pendientes */
    .btn-pendientes{
      border:1px solid rgba(255,255,255,.35);
      color:#fff;
      background:transparent;
      border-radius:10px;
      padding:6px 10px;
      font-size:13px;
      white-space:nowrap;
      position:relative;
    }
    .btn-pendientes:hover{ background:rgba(255,255,255,.10); }

    /* Resaltar pregunta cuando das Ir */
    .highlight-pregunta{
      outline:3px solid rgba(220,53,69,.35);
      border-radius:12px;
      transition:outline-color .6s ease;
    }

    /* Estilos lectura */
    .input-group{
      border-bottom:2px solid #323c55 !important;
      padding-bottom:10px !important;
      position:relative !important;
    }
    .input-group-text{
      font-weight:bold !important;
      border:none !important;
      background:transparent !important;
    }
    .respuesta-p{
      position:absolute !important;
      left:110px;
    }
    .form-floating{
      border-bottom:2px solid #323c55;
      padding-bottom:10px !important;
      background:transparent !important;
    }
    .parrafoComentarios{
      font-weight:bold;
      margin-left:12px;
      margin-bottom:0;
      padding-bottom:0;
    }
    .comentarios-p{
      margin:5px 0 0 12px;
      padding:0 !important;
    }
    .evidencias-guardadas{ margin-left:12px; }
    .evidencias-guardadas a{
      text-decoration:none;
      font-weight:500;
      color:#28334f;
      padding:4px 8px;
      border-radius:12px;
      transition:all 500ms ease-out;
    }
    .evidencias-guardadas a:hover{
      background-color:#28334f;
      color:#fff;
    }

    /* Bloqueo visual cuando ya está validada */
    .nota-bloqueada{
      opacity:.65;
      pointer-events:none;
    }
  </style>
